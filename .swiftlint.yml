included:
  - submil
  - submilTests
  - submilUITests

excluded:
  - submil.xcodeproj
  - DerivedData
  - .build

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_first_last
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

analyzer_rules:
  - unused_import
  - unused_declaration

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 2
  excluded:
    - id
    - to
    - up
